services:
  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"

  api:
    environment:
      APP_SERVER: gunicorn
    ports:
      - "127.0.0.1:${API_PORT:-8000}:8000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /data/nginx/certs:/etc/nginx/certs:ro
    healthcheck:
      test:
        - CMD-SHELL
        - wget -qO- http://127.0.0.1/api/v1/health >/dev/null 2>&1 || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
