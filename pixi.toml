[workspace]
channels = ["conda-forge"]
platforms = ["osx-arm64", "osx-64", "linux-64", "linux-aarch64"]

[dependencies]
python = ">=3.11,<3.14"
pytest = ">=8.3,<9"
pytest-cov = ">=5,<7"
ruff = ">=0.11,<0.12"
pre-commit = ">=4.2,<5"

[pypi-dependencies]
mriqc-aggregator = { path = ".", editable = true }
fastapi = ">=0.115,<0.116"
httpx = ">=0.27,<0.29"
ijson = ">=3.3,<4"
psycopg = { version = ">=3.2,<3.3", extras = ["binary"] }
sqlalchemy = ">=2.0,<2.1"
uvicorn = ">=0.30,<0.31"

[tasks]
pull-sample = "python scripts/pull_representative_sample.py"
db-up = "docker compose up -d postgres"
db-down = "docker compose down"
db-init = "python scripts/init_db.py"
db-load = "python scripts/load_raw_run.py"
db-load-dump = "python scripts/load_dump.py"
db-profile = "python scripts/profile_db.py"
api-dev = "uvicorn mriqc_aggregator.app:create_app --factory --reload"
stack-up = "docker compose up --build -d"
stack-logs = "docker compose logs -f api postgres"
test = "bash scripts/run_tests.sh -q"
test-cov = "bash scripts/run_tests.sh --cov=mriqc_aggregator --cov=scripts.start_api --cov-report=term-missing"
lint = "ruff check ."
format = "ruff format ."
format-check = "ruff format . --check"
