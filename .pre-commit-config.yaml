minimum_pre_commit_version: "4.0.0"

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: pixi run lint
        language: system
        pass_filenames: false
        always_run: true
      - id: ruff-format
        name: ruff format --check
        entry: pixi run format-check
        language: system
        pass_filenames: false
        always_run: true
