services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mriqc_aggregator}
      POSTGRES_USER: ${POSTGRES_USER:-mriqc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mriqc}
    expose:
      - "5432"
    volumes:
      - "${POSTGRES_DATA_DIR:-postgres-data}:/var/lib/postgresql/data"
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-mriqc} -d ${POSTGRES_DB:-mriqc_aggregator}
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MRIQC_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-mriqc}:${POSTGRES_PASSWORD:-mriqc}@postgres:5432/${POSTGRES_DB:-mriqc_aggregator}
      APP_SERVER: ${APP_SERVER:-uvicorn}
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-3}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
    expose:
      - "8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/api/v1/health", timeout=5)
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  postgres-data:
